<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGuard | Create New Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <style>
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
        }

        .auth-panel {
            position: relative;
            overflow: hidden;
        }

        .auth-panel::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150px;
            height: 150px;
            background: var(--primary-glow);
            filter: blur(50px);
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="brand">
            <ion-icon name="shield-checkmark"></ion-icon> Cyber<span>Guard</span>
        </a>
        <div class="nav-links">
            <a href="login.html">Login</a>
        </div>
    </nav>

    <main class="container auth-container animate-fade-in">
        <div class="glass-panel auth-panel">
            <h2 style="text-align: center; margin-bottom: 2rem;">Secure Your Account</h2>
            <form onsubmit="resetPassword(event)">
                <div class="form-group" id="emailGroup" style="display: none;">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Verification Code</label>
                    <input type="text" id="code" class="form-control" placeholder="Enter 6-digit code from email"
                        required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new_password" class="form-control" placeholder="Enter new password"
                        required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Update Password <ion-icon name="checkmark-circle-outline"></ion-icon>
                </button>
            </form>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        // Only show email field if it wasn't saved in session
        if (!sessionStorage.getItem('resetEmail')) {
            document.getElementById('emailGroup').style.display = 'block';
            document.getElementById('email').required = true;
        }
    </script>
</body>

</html>
