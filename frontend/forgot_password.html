<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGuard | Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <style>
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
        }

        .auth-panel {
            position: relative;
            overflow: hidden;
        }

        .auth-panel::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: var(--secondary-glow);
            filter: blur(50px);
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="brand">
            <ion-icon name="shield-checkmark"></ion-icon> Cyber<span>Guard</span>
        </a>
        <div class="nav-links">
            <a href="login.html">Login</a>
        </div>
    </nav>

    <main class="container auth-container animate-fade-in">
        <div class="glass-panel auth-panel">
            <h2 style="text-align: center; margin-bottom: 1rem;">Reset Password</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">
                Enter your email address and we'll send you a verification code to reset your password.
            </p>
            <form onsubmit="forgotPassword(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Send Reset Code <ion-icon name="mail-outline"></ion-icon>
                </button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Remember your password? <a href="login.html" style="color: var(--secondary);">Login here</a>
            </p>
        </div>
    </main>

    <script src="auth.js"></script>
</body>

</html>
